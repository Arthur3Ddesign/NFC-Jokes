<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NFC Random Joke</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #111827; padding: 24px 28px; border-radius: 12px; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
    h1 { margin-top: 0; font-size: 1.4rem; color: #38bdf8; }
    #joke { margin: 16px 0 24px; font-size: 1.1rem; line-height: 1.5; }
    button { border: none; border-radius: 999px; padding: 10px 18px; background: #22c55e; color: #022c22; font-weight: 600; cursor: pointer; }
    button:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tap for a Random Joke</h1>
    <p id="joke"></p>
    <button id="newJokeBtn">New joke</button>
  </div>
  <script>
    const jokes = [
      "I tried to catch fog yesterday. I mist.","I used to be indecisive. Now I'm not so sure.","I told my suitcase we're not going on holiday this year. Now I'm dealing with emotional baggage.","I don't trust stairs. They're always up to something.","I slept like a log last night. Woke up in the fireplace.","Why don't eggs tell jokes? They'd crack each other up.","I'm on a seafood diet. I see food and I eat it.","I burned 2,000 calories today. I left the pizza in the oven too long.","I would tell you a construction joke, but I'm still working on it.","I gave up my seat to a blind person on the bus. That's how I lost my job as a bus driver.","I used to be a banker but I lost interest.","I don't play soccer because I enjoy the sport. I'm just doing it for kicks.","I asked the librarian if the library had books on paranoia. She whispered, They're right behind you.","My boss told me to have a good day… so I went home.","I told my dentist my teeth are yellow. He told me to wear a brown tie.","I told my dog a joke. He didn't laugh, but he did roll over.","I couldn't figure out why the baseball was getting bigger. Then it hit me.","My X-ray vision is terrible. I can only see right through my money.","I gave my computer a cookie. Now it won't stop accepting cookies.","I told my phone we needed to talk. Now it's on airplane mode.","I asked the gym instructor, Can you teach me to do the splits? He said, How flexible are you? I said, I can't do Tuesdays.","I used to hate facial hair, but then it grew on me.","I got hit in the head with a can of soda. Luckily, it was a soft drink.","I know they say that money talks, but all mine says is Goodbye.","I told my Wi‑Fi a joke. It didn't get it, probably bad connection.","I tried to sue the airline for losing my luggage. I lost my case.","I tried to eat a clock. It was very time‑consuming.","I used to be a baker, but I couldn't make enough dough.","I stayed up all night wondering where the sun went. Then it dawned on me.","I'm reading a book about glue. I just can't put it down.","I used to be a lifeguard, but some blue kid got me fired.","I told my car it was adopted. Now it won't start.","I don't buy anything with Velcro. It's a total rip‑off.","I'm so good at sleeping, I can do it with my eyes closed.","My math teacher called me average. How mean.","I only drink on two occasions: when it's my birthday and when it's not.","My wallet is like an onion. Opening it makes me cry.","I told my mirror I'd see it later. It said, I'll be looking out for you.","I asked my dog, What's two minus two? He said nothing.","I don't trust atoms. They make up everything.","I ate a dictionary. It gave me thesaurus throat.","I gave all my dead batteries away. Free of charge.","I'm friends with 25 letters of the alphabet. I don't know Y.","I ordered a chicken and an egg online. I'll let you know which comes first.","I tried to organize a hide‑and‑seek tournament, but good players are hard to find.","I hate Russian dolls. They're so full of themselves.","My computer sang a song. It had too many bytes.","I wanted to be a historian, but I figured there was no future in it.","I asked the waiter if my burger would be long. He said, No, it'll be round.","I used to have a job crushing cans. It was soda pressing.","I put my grandma on speed dial. I call it Instagram.","I told my mum she drew her eyebrows too high. She looked surprised.","My friend's bakery burned down. Now his business is toast.","I'm reading a horror story in Braille. Something bad is going to happen, I can feel it.","I told my plants jokes. Now they're doing stand‑up roots.","I once worked at a calendar factory but got fired for taking a day off.","I broke my finger last week. On the other hand, I'm okay.","I was going to tell a time‑travel joke, but you didn't like it.","I got a reversible jacket for my birthday. I can't wait to see how it turns out.","I'd tell you a roof joke, but it's over your head.","I told my chef he was seasoning too much. He said, That's a salt.","My friend says he doesn't understand cloning. I told him, That makes two of us.","I tried to write a joke about paper. It's tearable.","I used to be a magician, but I pulled my career out of a hat.","I cleaned my vacuum. Now it really sucks.","I saw a sign that said Watch for children. I thought, Sounds like a fair trade.","I tried to take a selfie with some fog. It was too mist‑erious.","I told my fridge a joke. Now it's running.","I accidentally swallowed some food colouring. The doctor says I'm okay, but I feel like I've dyed a little inside.","I sold my vacuum. It was just collecting dust.","My friend's bakery only sells day‑old bread. It's a crumby business.","I had a joke about chemistry, but I knew I wouldn't get a reaction.","I thought about going on an all‑almond diet. But that's just nuts.","I put my bed in the fireplace. Now I sleep like a log.","I used to date a calendar. We had a lot of dates.","I gave my friend an elephant for his room. He said, Thanks. I said, Don't mention it.","I stayed up all night trying to figure out where the stars went. Then it nighted on me.","I bought a boomerang. Now I'm afraid to throw the old one away.","I told my clock we were breaking up. Now it's taking its time.","I once ate a watch. It was time‑consuming.","I told my friend she was drawing circles too big. She said, That's how I roll.","I tried to start a professional hide‑and‑seek team. But good players are still hiding.","I asked my suitcase why it was so heavy. It was full of excuses.","I tried to dance like my phone. It was on airplane mode, so I just stood still.","I wrote a song about a tortilla. It's more of a wrap.","I bought a ladder. It's a step up in life.","I told my shoes we're not going out. They needed to heel.","I used to think I was indecisive, but now I'm not quite sure.","I got a job at a bakery because I kneaded dough.","I was going to look for my missing watch, but I could never find the time.","I tried to make a pencil with two erasers. It was pointless.","I told my shadow to stop following me. It said, Make me."
    ];
    function showRandomJoke() {
      const index = Math.floor(Math.random() * jokes.length);
      document.getElementById("joke").textContent = jokes[index];
    }
    document.getElementById("newJokeBtn").addEventListener("click", showRandomJoke);
    showRandomJoke();
  </script>
</body>
</html>
